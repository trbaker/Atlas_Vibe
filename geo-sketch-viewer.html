<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Data Mapper for MapMaker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito','Segoe UI',Arial,sans-serif;background:#f0f4ff;color:#2d2d6b;overflow:hidden;}
body{display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#6c63ff 0%,#48b5e8 100%);color:#fff;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle 3px at 88% 30%,rgba(255,255,255,0.35) 100%,transparent 100%),radial-gradient(circle 4px at 92% 65%,rgba(255,220,100,0.5) 100%,transparent 100%),radial-gradient(circle 3px at 95% 80%,rgba(255,150,150,0.4) 100%,transparent 100%);pointer-events:none;}
header::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,0.06) 0px,rgba(255,255,255,0.06) 1px,transparent 1px,transparent 20px),repeating-linear-gradient(90deg,rgba(255,255,255,0.06) 0px,rgba(255,255,255,0.06) 1px,transparent 1px,transparent 20px);pointer-events:none;}
.header-logo{width:42px;height:42px;flex-shrink:0;background:rgba(255,255,255,0.22);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.header-text{position:relative;z-index:1;}
header h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:0.01em;}
header .sub{font-size:10px;color:rgba(255,255,255,0.75);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-top:1px;}
header .version{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.55);font-family:monospace;position:relative;z-index:1;}
.toolbar{background:#fff;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #e8eaf6;flex-shrink:0;box-shadow:0 2px 8px rgba(108,99,255,0.08);}
.upload-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#6c63ff,#48b5e8);color:#fff;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform 0.12s,box-shadow 0.12s;box-shadow:0 3px 10px rgba(108,99,255,0.35);}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(108,99,255,0.45);}
input[type=file]{display:none;}
.tool-btn{background:#f0f4ff;border:1.5px solid #c5cae9;color:#3949ab;padding:7px 13px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.1s,transform 0.1s;}

.arcgis-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;opacity:0.38;pointer-events:none;transition:transform 0.12s,box-shadow 0.12s,opacity 0.15s;box-shadow:0 3px 10px rgba(255,107,107,0.3);}
.arcgis-btn.ready{opacity:1;pointer-events:auto;}
.arcgis-btn.ready:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(255,107,107,0.45);}
.sep{width:1px;height:24px;background:#e8eaf6;margin:0 2px;}
#statusPill{margin-left:auto;font-size:12px;color:#9fa8da;font-weight:600;}
#statusPill span{background:linear-gradient(135deg,#6c63ff,#48b5e8);color:#fff;border-radius:12px;padding:2px 10px;margin-left:4px;font-size:11px;font-weight:700;}
.main{display:flex;flex:1;min-height:0;}
#mapwrap{flex:1;min-height:0;position:relative;}
#map{width:100%;height:100%;}
#dropOverlay{display:none;position:absolute;inset:0;background:rgba(108,99,255,0.15);border:4px dashed #6c63ff;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#6c63ff;font-size:20px;font-weight:800;}

#emptyHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:500;}

.leaflet-popup-content-wrapper{background:#fff!important;border:none!important;border-radius:16px!important;color:#2d2d6b!important;font-family:'Nunito','Segoe UI',Arial,sans-serif!important;font-size:13px!important;font-weight:600!important;box-shadow:0 4px 20px rgba(108,99,255,0.2)!important;}

#agolSaveOk:disabled{background:#c5cae9;box-shadow:none;cursor:default;transform:none;}
</style>

<script>
/* ── KML parser ── */
function parseKml(doc){
  const all=(p,t)=>Array.from(p.getElementsByTagNameNS('*',t));
  const one=(p,t)=>{const r=p.getElementsByTagNameNS('*',t);return r.length?r[0]:null;};
  const txt=(p,t)=>{const e=one(p,t);return e?e.textContent.trim():'';};
  function coords(str){return str.trim().split(/\s+/).map(s=>s.split(',').map(Number)).filter(p=>p.length>=2&&!isNaN(p[0])&&!isNaN(p[1])).map(p=>[p[0],p[1]]);}
  function ring(el){const c=one(el,'coordinates');return c?coords(c.textContent):[];}
  function geom(el){
    const t=el.localName;
    if(t==='Point'){const c=one(el,'coordinates');if(!c)return null;const p=coords(c.textContent);return p.length?{type:'Point',coordinates:p[0]}:null;}
    if(t==='LineString'){const c=one(el,'coordinates');if(!c)return null;const p=coords(c.textContent);return p.length?{type:'LineString',coordinates:p}:null;}
    if(t==='LinearRing'){const c=one(el,'coordinates');if(!c)return null;const p=coords(c.textContent);return p.length?{type:'LineString',coordinates:p}:null;}
    if(t==='Polygon'){const ob=one(el,'outerBoundaryIs');if(!ob)return null;const or2=one(ob,'LinearRing');if(!or2)return null;const outer=ring(or2);if(!outer.length)return null;const rings=[outer];all(el,'innerBoundaryIs').forEach(ib=>{const ir=one(ib,'LinearRing');if(ir){const r=ring(ir);if(r.length)rings.push(r);}});return{type:'Polygon',coordinates:rings};}
    if(t==='MultiGeometry'){const gs=Array.from(el.children).map(geom).filter(Boolean);if(!gs.length)return null;if(gs.every(g=>g.type==='Point'))return{type:'MultiPoint',coordinates:gs.map(g=>g.coordinates)};if(gs.every(g=>g.type==='LineString'))return{type:'MultiLineString',coordinates:gs.map(g=>g.coordinates)};if(gs.every(g=>g.type==='Polygon'))return{type:'MultiPolygon',coordinates:gs.map(g=>g.coordinates)};return{type:'GeometryCollection',geometries:gs};}
    return null;
  }
  const features=[];
  all(doc,'Placemark').forEach(pm=>{
    const props={};
    const n=txt(pm,'name'),d=txt(pm,'description');
    if(n)props.name=n;if(d)props.description=d.replace(/<[^>]*>/g,'').trim().slice(0,200);
    all(pm,'SimpleData').forEach(sd=>{const k=sd.getAttribute('name');if(k)props[k]=sd.textContent.trim();});
    all(pm,'Data').forEach(d=>{const k=d.getAttribute('name');const v=one(d,'value');if(k&&v)props[k]=v.textContent.trim();});
    let g=null;
    for(const tag of ['Point','LineString','LinearRing','Polygon','MultiGeometry']){const el=one(pm,tag);if(el){g=geom(el);if(g)break;}}
    if(g)features.push({type:'Feature',geometry:g,properties:props});
  });
  return{type:'FeatureCollection',features};
}

/* ── GPX parser ── */
function parseGpx(doc){
  const all=(p,t)=>Array.from(p.getElementsByTagNameNS('*',t));
  const one=(p,t)=>{const r=p.getElementsByTagNameNS('*',t);return r.length?r[0]:null;};
  const txt=(p,t)=>{const e=one(p,t);return e?e.textContent.trim():'';};
  const features=[];
  all(doc,'wpt').forEach(w=>{const la=parseFloat(w.getAttribute('lat')),lo=parseFloat(w.getAttribute('lon'));if(!isNaN(la)&&!isNaN(lo))features.push({type:'Feature',geometry:{type:'Point',coordinates:[lo,la]},properties:{name:txt(w,'name'),desc:txt(w,'desc')}});});
  all(doc,'trk').forEach(trk=>{all(trk,'trkseg').forEach(seg=>{const cs=all(seg,'trkpt').map(p=>{const la=parseFloat(p.getAttribute('lat')),lo=parseFloat(p.getAttribute('lon'));return isNaN(la)?null:[lo,la];}).filter(Boolean);if(cs.length)features.push({type:'Feature',geometry:{type:'LineString',coordinates:cs},properties:{name:txt(trk,'name')}});});});
  all(doc,'rte').forEach(rte=>{const cs=all(rte,'rtept').map(p=>{const la=parseFloat(p.getAttribute('lat')),lo=parseFloat(p.getAttribute('lon'));return isNaN(la)?null:[lo,la];}).filter(Boolean);if(cs.length)features.push({type:'Feature',geometry:{type:'LineString',coordinates:cs},properties:{name:txt(rte,'name')}});});
  return{type:'FeatureCollection',features};
}

/* ── CSV parser ── */
function parseCsv(text){
  const lines=text.trim().split('\n');
  const hdr=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const la=hdr.findIndex(h=>['lat','latitude','y'].includes(h));
  const lo=hdr.findIndex(h=>['lon','lng','longitude','x'].includes(h));
  if(la<0||lo<0)throw new Error('No lat/lon columns found');
  const features=[];
  for(let i=1;i<lines.length;i++){
    const v=csvRow(lines[i]);const lat=parseFloat(v[la]),lon=parseFloat(v[lo]);
    if(isNaN(lat)||isNaN(lon))continue;
    const props={};hdr.forEach((h,j)=>{props[h]=(v[j]||'').trim();});
    features.push({type:'Feature',geometry:{type:'Point',coordinates:[lon,lat]},properties:props});
  }
  return{type:'FeatureCollection',features};
}
function csvRow(line){const res=[];let cur='',inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;continue;}if(ch===','&&!inQ){res.push(cur);cur='';continue;}cur+=ch;}res.push(cur);return res;}

/* ── Map ── */
const COLORS=['#e8a030','#4a9e7a','#c04a3a','#5a7ab4','#9a6ab4','#4a8a9a','#c07a30','#7a9a4a'];
let colorIdx=0,map;
const layers=[];

window.addEventListener('load',()=>{
  map=L.map('map').setView([20,0],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(map);
  const wrap=document.getElementById('mapwrap');
  wrap.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dropOverlay').classList.add('active');});
  wrap.addEventListener('dragleave',()=>document.getElementById('dropOverlay').classList.remove('active'));
  wrap.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dropOverlay').classList.remove('active');[...e.dataTransfer.files].forEach(loadFile);});
});

document.getElementById('fileIn').addEventListener('change',e=>{[...e.target.files].forEach(loadFile);e.target.value='';});

async function loadFile(file){
  const ext=file.name.split('.').pop().toLowerCase(),raw=await file.text();
  let gj;
  try{
    if(ext==='geojson'||ext==='json')gj=JSON.parse(raw);
    else if(ext==='kml'||ext==='xml'){const d=new DOMParser().parseFromString(raw,'application/xml');if(d.querySelector('parsererror'))throw new Error('XML parse error');gj=parseKml(d);}
    else if(ext==='gpx'){const d=new DOMParser().parseFromString(raw,'application/xml');if(d.querySelector('parsererror'))throw new Error('XML parse error');gj=parseGpx(d);}
    else if(ext==='csv')gj=parseCsv(raw);
    else{alert('Unsupported: .'+ext);return;}
    if(gj)addLayer(file.name,gj);
  }catch(err){console.error(err);alert('Error loading '+file.name+':\n'+err.message);}
}

/* ── Feature edit tracking ───────────────────────────────────────────────
   _edits: Map<featureId, {geometry?, properties?}>
   Each entry holds only the changed fields/geometry for that feature.
   collectFeatures() merges edits into the original features before export. */
const _edits=new Map();
let _featureCounter=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* Build an editable popup for a feature */
function makeEditPopup(fid, props, leafletLayer, isPoint){
  const keys=Object.keys(props);
  const fieldsHtml=keys.length
    ? keys.slice(0,15).map(k=>
        '<div style="margin-bottom:6px;">'+
        '<div style="font-size:10px;color:#7986cb;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:2px;">'+esc(k)+'</div>'+
        '<input data-key="'+esc(k)+'" value="'+esc(String(props[k]||''))+'" '+
        'style="width:100%;border:1.5px solid #e8eaf6;border-radius:6px;padding:5px 8px;font-size:12px;'+
        'font-family:Nunito,Arial,sans-serif;color:#2d2d6b;font-weight:600;background:#f8f9ff;box-sizing:border-box;" '+
        'onfocus="this.style.borderColor=\"#6c63ff\"" onblur="this.style.borderColor=\"#e8eaf6\"">'+
        '</div>'
      ).join('')
    : '<div style="font-size:12px;color:#9fa8da;font-style:italic;">No attributes</div>';

  const dragNote=isPoint
    ? '<div style="font-size:10px;color:#9fa8da;margin-bottom:8px;">&#128205; Drag the marker to move it</div>'
    : '';

  return '<div style="font-family:Nunito,Arial,sans-serif;min-width:200px;max-width:280px;">'+
    dragNote+
    '<div id="fields_'+fid+'" style="max-height:220px;overflow-y:auto;">'+fieldsHtml+'</div>'+
    '<button onclick="savePopupEdits(\"'+fid+'\")" '+
    'style="margin-top:8px;width:100%;background:linear-gradient(135deg,#6c63ff,#48b5e8);color:#fff;border:none;'+
    'padding:7px 0;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">'+
    '&#10003; Save Changes</button>'+
    '<div id="psave_'+fid+'" style="font-size:11px;color:#7986cb;margin-top:4px;text-align:center;"></div>'+
    '</div>';
}

/* Called by the Save Changes button inside a popup */
function savePopupEdits(fid){
  const container=document.getElementById('fields_'+fid);
  if(!container)return;
  const inputs=container.querySelectorAll('input[data-key]');
  const propChanges={};
  inputs.forEach(inp=>{propChanges[inp.dataset.key]=inp.value;});
  const existing=_edits.get(fid)||{};
  _edits.set(fid,{...existing,properties:propChanges});
  const msg=document.getElementById('psave_'+fid);
  if(msg){msg.textContent='✓ Saved – will be included in ArcGIS export';
    setTimeout(()=>{if(msg)msg.textContent='';},2500);}
  updateEditBadge();
}

/* Update the toolbar dirty indicator */
function updateEditBadge(){
  const n=_edits.size;
  let badge=document.getElementById('editBadge');
  if(!badge){
    badge=document.createElement('span');badge.id='editBadge';
    badge.style.cssText='font-size:11px;color:#ff8e53;font-weight:700;margin-left:2px;';
    const pill=document.getElementById('statusPill');
    if(pill)pill.parentNode.insertBefore(badge,pill);
  }
  badge.textContent=n>0?'✏️ '+n+' edit'+(n>1?'s':''):'';
}

function addLayer(name,gj){
  if(gj.type==='Feature')gj={type:'FeatureCollection',features:[gj]};
  if(!gj.features||!gj.features.length){alert('No features found in '+name);return;}
  const color=COLORS[colorIdx++%COLORS.length];
  let pts=0,lines=0,polys=0;

  const lyr=L.geoJSON(gj,{
    style:()=>({color,weight:2.5,opacity:0.9,fillColor:color,fillOpacity:0.25}),

    pointToLayer:(f,ll)=>{
      pts++;
      // Assign a stable feature ID
      if(!f._fid)f._fid='f'+(++_featureCounter);
      const fid=f._fid;

      // Use a draggable DivIcon marker instead of a static circleMarker
      const icon=L.divIcon({
        className:'',
        html:'<div style="width:14px;height:14px;border-radius:50%;background:'+color+
             ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:grab;'+
             'transition:transform 0.1s;" title="Drag to move"></div>',
        iconSize:[14,14],iconAnchor:[7,7]
      });
      const marker=L.marker(ll,{icon,draggable:true});

      // Track drag end — update geometry in edit store
      marker.on('dragend',()=>{
        const pos=marker.getLatLng();
        const existing=_edits.get(fid)||{};
        _edits.set(fid,{...existing,
          geometry:{type:'Point',coordinates:[pos.lng,pos.lat]}
        });
        // Keep feature ref in sync so popup save picks up the right props
        if(marker.feature)marker.feature.geometry.coordinates=[pos.lng,pos.lat];
        updateEditBadge();
        // Visual feedback: flash the marker
        const el=marker.getElement();
        if(el){el.style.transform+=' scale(1.4)';setTimeout(()=>{if(el)el.style.transform=el.style.transform.replace(' scale(1.4)','');},200);}
      });

      // Editable popup
      marker.on('click',()=>{
        const props={...(f.properties||{}),...((_edits.get(fid)||{}).properties||{})};
        marker.bindPopup(makeEditPopup(fid,props,marker,true),{maxWidth:300,minWidth:220}).openPopup();
      });

      // Attach fid to feature for later collection
      marker.feature=f;marker.feature._fid=fid;
      return marker;
    },

    onEachFeature:(f,l)=>{
      const gt=f.geometry&&f.geometry.type||'';
      if(gt==='LineString'||gt==='MultiLineString')lines++;
      if(gt==='Polygon'||gt==='MultiPolygon')polys++;
      if(gt==='Point'||gt==='MultiPoint')return; // handled above

      // Assign stable fid
      if(!f._fid)f._fid='f'+(++_featureCounter);
      const fid=f._fid;
      l.feature=f;

      // Editable popup for lines/polygons (no drag)
      l.on('click',()=>{
        const props={...(f.properties||{}),...((_edits.get(fid)||{}).properties||{})};
        l.bindPopup(makeEditPopup(fid,props,l,false),{maxWidth:300,minWidth:220}).openPopup();
      });
    }
  }).addTo(map);

  layers.push({name,color,lyr,visible:true,pts,lines,polys});
  updateStats();
  document.getElementById('emptyHint').style.display='none';
  fitAll();
}

function updateStats(){
  let tp=0,tl=0,tpo=0;layers.forEach(l=>{tp+=l.pts;tl+=l.lines;tpo+=l.polys;});
  document.getElementById('arcgisBtn').classList[tp+tl+tpo>0?'add':'remove']('ready');
  document.getElementById('statusPill').innerHTML=layers.length
    ?'&#128205; '+layers.length+' layer'+(layers.length>1?'s':'')+' <span>'+(tp+tl+tpo)+' features</span>'
    :'&#128205; No layers loaded';
}

function fitAll(){
  const vis=layers.filter(l=>l.visible);if(!vis.length)return;
  try{const b=L.featureGroup(vis.map(l=>l.lyr)).getBounds();if(b.isValid())map.fitBounds(b,{padding:[40,40]});}catch(e){}
}

function clearAll(){
  layers.forEach(l=>map.removeLayer(l.lyr));layers.length=0;
  _edits.clear();updateEditBadge();updateStats();
  document.getElementById('emptyHint').style.display='block';
}

function collectFeatures(){
  /* Merge tracked edits into a clean copy of each feature before export */
  const out=[];
  layers.filter(l=>l.visible).forEach(l=>{
    l.lyr.eachLayer(gl=>{
      const f=gl.feature||(gl.toGeoJSON&&gl.toGeoJSON());
      if(!f)return;
      const fid=f._fid;
      const edit=fid?_edits.get(fid):null;
      if(edit){
        const merged={...f,
          geometry:edit.geometry||f.geometry,
          properties:{...(f.properties||{}),...(edit.properties||{})}
        };
        out.push(merged);
      }else{
        out.push(f);
      }
    });
  });
  return out;
}

function flatCoords(g){
  if(!g)return[];const t=g.type;
  if(t==='Point')return[g.coordinates];if(t==='MultiPoint')return g.coordinates;
  if(t==='LineString')return g.coordinates;if(t==='MultiLineString')return g.coordinates.flat(1);
  if(t==='Polygon')return g.coordinates.flat(1);if(t==='MultiPolygon')return g.coordinates.flat(2);
  return[];
}

/* ── Web Map JSON ── */
function makeRenderer(gt,r,g,b){
  if(gt==='point')return{type:'simple',symbol:{type:'esriSMS',style:'esriSMSCircle',color:[r,g,b,200],size:10,angle:0,xoffset:0,yoffset:0,outline:{color:[255,255,255,220],width:1.5}}};
  if(gt==='line')return{type:'simple',symbol:{type:'esriSLS',style:'esriSLSSolid',color:[r,g,b,220],width:2.5}};
  return{type:'simple',symbol:{type:'esriSFS',style:'esriSFSSolid',color:[r,g,b,70],outline:{type:'esriSLS',style:'esriSLSSolid',color:[r,g,b,220],width:2}}};
}

function buildWebMapJSON(features){
  let minX=180,maxX=-180,minY=90,maxY=-90;
  features.forEach(f=>{flatCoords(f.geometry).forEach(([x,y])=>{if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;});});
  const pad=0.05;minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const buckets=[
    {label:'Points',  types:['Point','MultiPoint'],          rgb:[232,96,48],  gt:'point'},
    {label:'Lines',   types:['LineString','MultiLineString'], rgb:[48,140,200], gt:'line'},
    {label:'Polygons',types:['Polygon','MultiPolygon'],       rgb:[74,158,122], gt:'polygon'},
  ];
  const opLayers=[];
  buckets.forEach(({label,types,rgb,gt})=>{
    const subset=features.filter(f=>f.geometry&&types.includes(f.geometry.type));
    if(!subset.length)return;
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify({type:'FeatureCollection',features:subset}))));
    const[r,g,b]=rgb;
    const fn=[...new Set(subset.flatMap(f=>Object.keys(f.properties||{})))];
    opLayers.push({id:'sketch_'+gt,title:label,layerType:'GeoJSON',url:'data:application/geo+json;base64,'+b64,opacity:1,visibility:true,renderer:makeRenderer(gt,r,g,b),popupInfo:{title:fn[0]?'{'+fn[0]+'}':label,fieldInfos:fn.slice(0,20).map(k=>({fieldName:k,label:k,visible:true,isEditable:false})),showAttachments:false,mediaInfos:[]}});
  });
  return{
    type:'Web Map',version:'2.27',
    authoringApp:'MapMaker',authoringAppVersion:'1.2.2',
    typeKeywords:['Atlas','Web Map','0cd1cdee853c413a84bfe4b9a6931f0d','Mapmaker'],
    spatialReference:{wkid:102100,latestWkid:3857},
    initialState:{viewpoint:{targetGeometry:{type:'extent',xmin:minX,ymin:minY,xmax:maxX,ymax:maxY,spatialReference:{wkid:4326}}}},
    baseMap:{baseMapLayers:[{id:'world_street',layerType:'ArcGISTiledMapServiceLayer',url:'https://services.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer',title:'World Street Map',visibility:true,opacity:1}],title:'World Street Map'},
    operationalLayers:opLayers
  };
}

/* ── AGOL Save ── */
const AGOL_REST='https://www.arcgis.com/sharing/rest';
let _credCache=null; // {username, password, expiry}

function saveToAGOLFlow(){
  const features=collectFeatures();
  if(!features.length){alert('No visible features to send.');return;}
  window._pendingFeatures=features;
  showSaveDialog();
}

function showSaveDialog(){
  document.getElementById('agolModal').style.display='flex';
  document.getElementById('agolTitle').value='GPS Map – '+new Date().toLocaleString();
  document.getElementById('agolStatus').textContent='';
  document.getElementById('agolSaveOk').disabled=false;
  document.getElementById('agolSaveOk').textContent='Sign in & Save';
  // Restore remembered credentials if still valid
  if(_credCache&&Date.now()<_credCache.expiry){
    document.getElementById('agolUser').value=_credCache.username;
    document.getElementById('agolPass').value=_credCache.password;
    document.getElementById('rememberMe').checked=true;
    document.getElementById('agolStatus').textContent=
      '⏱ Credentials remembered until '+new Date(_credCache.expiry).toLocaleTimeString();
  }else{
    _credCache=null;
    document.getElementById('agolPass').value='';
    document.getElementById('rememberMe').checked=false;
  }
}
function hideSaveDialog(){document.getElementById('agolModal').style.display='none';}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('agolModal').style.display==='flex')confirmSave();
});

async function confirmSave(){
  const title  =(document.getElementById('agolTitle').value  ||'').trim()||'GPS Map';
  const snippet=(document.getElementById('agolSnippet').value||'').trim();
  const tags   =(document.getElementById('agolTags').value   ||'').trim()||'sketch, Atlas';
  const remember=document.getElementById('rememberMe').checked;
  const statusEl=document.getElementById('agolStatus'),okBtn=document.getElementById('agolSaveOk');
  const username=(document.getElementById('agolUser').value||'').trim();
  const password=document.getElementById('agolPass').value;
  if(!username){statusEl.textContent='Please enter your ArcGIS Online username.';return;}
  if(!password){statusEl.textContent='Please enter your password.';return;}
  okBtn.disabled=true;statusEl.textContent='Signing in…';
  try{
    const tb=new URLSearchParams();
    tb.append('f','json');tb.append('username',username);tb.append('password',password);
    tb.append('client','requestip');tb.append('expiration','60');
    const tr=await fetch(AGOL_REST+'/generateToken',{method:'POST',body:tb,
      headers:{'Content-Type':'application/x-www-form-urlencoded'}}).then(r=>r.json());
    if(tr.error)throw new Error(tr.error.message||'Sign-in failed. Check your username and password.');
    if(!tr.token)throw new Error('No token returned. Check your username and password.');
    const token=tr.token;
    // Cache or clear credentials
    if(remember){
      _credCache={username,password,expiry:Date.now()+60*60*1000};
    }else{
      _credCache=null;
      document.getElementById('agolPass').value='';
    }
    statusEl.textContent='Saving web map…';
    const webMap=buildWebMapJSON(window._pendingFeatures);
    let minX=180,maxX=-180,minY=90,maxY=-90;
    window._pendingFeatures.forEach(f=>{flatCoords(f.geometry).forEach(([x,y])=>{if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;});});
    const body=new URLSearchParams();
    body.append('f','json');body.append('title',title);body.append('type','Web Map');
    body.append('snippet',snippet);body.append('tags',tags);
    body.append('typeKeywords','Atlas,Web Map,0cd1cdee853c413a84bfe4b9a6931f0d,Mapmaker');
    body.append('extent',[minX,minY,maxX,maxY].join(','));
    body.append('text',JSON.stringify(webMap));
    const addResp=await fetch(AGOL_REST+'/content/users/'+encodeURIComponent(username)+'/addItem?token='+encodeURIComponent(token),
      {method:'POST',body,headers:{'Content-Type':'application/x-www-form-urlencoded'}}).then(r=>r.json());
    if(!addResp.success)throw new Error(addResp.error&&addResp.error.message||JSON.stringify(addResp));
    statusEl.innerHTML='✓ Saved! Opening ArcGIS Online Map Viewer…';
    setTimeout(()=>{hideSaveDialog();window.open('https://www.arcgis.com/apps/mapviewer/index.html?webmap='+addResp.id,'_blank');},1200);
  }catch(err){
    console.error(err);statusEl.textContent='Error: '+err.message;
    okBtn.disabled=false;okBtn.textContent='Retry';
  }
}
</script>
